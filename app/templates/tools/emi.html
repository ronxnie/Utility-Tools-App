{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-4xl">
  <a href="{{ url_for('main.index') }}" class="text-sm font-bold text-aqua">← Dashboard</a>
  <h1 class="mt-3 text-4xl font-black">{{ title }}</h1>
  <form method="post" class="mt-6 rounded-3xl border border-white/40 bg-white/85 p-6 shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">
    <div class="grid gap-4 md:grid-cols-3">
      <label><span class="font-bold">Principal</span><input name="principal" type="number" step="0.01" value="{{ values.principal }}" class="mt-2 w-full rounded-2xl dark:bg-slate-900"></label>
      <label><span class="font-bold">Annual Rate %</span><input name="rate" type="number" step="0.01" value="{{ values.rate }}" class="mt-2 w-full rounded-2xl dark:bg-slate-900"></label>
      <label><span class="font-bold">Tenure Months</span><input name="months" type="number" value="{{ values.months }}" class="mt-2 w-full rounded-2xl dark:bg-slate-900"></label>
    </div>
    <button class="mt-5 rounded-2xl bg-aqua px-6 py-3 font-black text-white" type="submit">Calculate EMI</button>
    {% if result %}
      <div class="mt-6 grid gap-3 md:grid-cols-3">
        <div class="rounded-2xl bg-slate-100 p-5 dark:bg-white/10"><div class="text-3xl font-black">{{ result.emi }}</div><div class="font-bold text-slate-500">Monthly EMI</div></div>
        <div class="rounded-2xl bg-slate-100 p-5 dark:bg-white/10"><div class="text-3xl font-black">{{ result.total_interest }}</div><div class="font-bold text-slate-500">Interest</div></div>
        <div class="rounded-2xl bg-slate-100 p-5 dark:bg-white/10"><div class="text-3xl font-black">{{ result.total_payment }}</div><div class="font-bold text-slate-500">Total</div></div>
      </div>
    {% endif %}
  </form>
</section>
{% endblock %}
