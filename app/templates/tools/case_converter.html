{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-5xl">
  <a href="{{ url_for('main.index') }}" class="text-sm font-bold text-aqua">← Dashboard</a>
  <h1 class="mt-3 text-4xl font-black">{{ title }}</h1>
  <form method="post" class="mt-6 grid gap-5">
    <textarea name="text" rows="8" class="rounded-3xl border-white/40 bg-white/85 p-5 shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70" placeholder="Paste text to convert">{{ text }}</textarea>
    <div class="flex flex-wrap items-center gap-3 rounded-3xl border border-white/40 bg-white/85 p-4 shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">
      {% for value, label in [("upper", "UPPER"), ("lower", "lower"), ("title", "Title"), ("sentence", "Sentence")] %}
        <label class="cursor-pointer rounded-full border px-4 py-2 text-sm font-bold dark:border-white/10">
          <input class="mr-2" type="radio" name="mode" value="{{ value }}" {% if mode == value %}checked{% endif %}>{{ label }}
        </label>
      {% endfor %}
      <button class="ml-auto rounded-full bg-coral px-6 py-3 font-black text-white" type="submit">Convert</button>
    </div>
    {% if result %}
      <textarea readonly rows="8" class="rounded-3xl border-white/40 bg-white/85 p-5 shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">{{ result }}</textarea>
    {% endif %}
  </form>
</section>
{% endblock %}
