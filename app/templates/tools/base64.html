{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-6xl">
  <a href="{{ url_for('main.index') }}" class="text-sm font-bold text-aqua">← Dashboard</a>
  <h1 class="mt-3 text-4xl font-black">{{ title }}</h1>
  <form method="post" class="mt-6 grid gap-5 lg:grid-cols-2">
    <div class="rounded-3xl border border-white/40 bg-white/85 p-5 shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">
      <textarea name="raw" rows="14" class="w-full rounded-2xl border-slate-200 bg-white p-4 font-mono text-sm dark:border-white/10 dark:bg-slate-900" placeholder="Text or Base64 content">{{ raw }}</textarea>
      <div class="mt-4 flex flex-wrap gap-3">
        <label class="rounded-full border px-4 py-2 font-bold dark:border-white/10"><input class="mr-2" type="radio" name="mode" value="encode" {% if mode == "encode" %}checked{% endif %}>Encode</label>
        <label class="rounded-full border px-4 py-2 font-bold dark:border-white/10"><input class="mr-2" type="radio" name="mode" value="decode" {% if mode == "decode" %}checked{% endif %}>Decode</label>
        <button class="ml-auto rounded-full bg-coral px-6 py-3 font-black text-white" type="submit">Run</button>
      </div>
    </div>
    <textarea readonly rows="14" class="rounded-3xl border-white/40 bg-white/85 p-5 font-mono text-sm shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">{{ result }}</textarea>
  </form>
</section>
{% endblock %}
