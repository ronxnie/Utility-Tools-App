{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-4xl">
  <a href="{{ url_for('main.index') }}" class="text-sm font-bold text-aqua">← Dashboard</a>
  <h1 class="mt-3 text-4xl font-black">{{ title }}</h1>
  <form method="post" class="mt-6 rounded-3xl border border-white/40 bg-white/85 p-5 shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">
    <div class="grid gap-4 sm:grid-cols-3">
      <label><span class="font-bold">Version</span><select name="version" class="mt-2 w-full rounded-2xl dark:bg-slate-900"><option value="4" {% if version == "4" %}selected{% endif %}>UUID v4</option><option value="1" {% if version == "1" %}selected{% endif %}>UUID v1</option></select></label>
      <label><span class="font-bold">Count</span><input name="count" type="number" min="1" max="100" value="{{ count }}" class="mt-2 w-full rounded-2xl dark:bg-slate-900"></label>
      <button class="self-end rounded-2xl bg-aqua px-6 py-3 font-black text-white" type="submit">Generate</button>
    </div>
    <div class="mt-5 grid gap-2">
      {% for item in uuids %}
        <code class="rounded-2xl bg-slate-100 p-3 text-sm dark:bg-white/10">{{ item }}</code>
      {% endfor %}
    </div>
  </form>
</section>
{% endblock %}
