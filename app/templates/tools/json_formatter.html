{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-6xl">
  <a href="{{ url_for('main.index') }}" class="text-sm font-bold text-aqua">← Dashboard</a>
  <h1 class="mt-3 text-4xl font-black">{{ title }}</h1>
  <form method="post" class="mt-6 grid gap-5 lg:grid-cols-2">
    <div>
      <label class="font-bold">Input JSON</label>
      <textarea name="raw" rows="18" class="mt-2 w-full rounded-3xl border-white/40 bg-white/85 p-5 font-mono text-sm shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70" placeholder='{"hello":"world"}'>{{ raw }}</textarea>
      <button class="mt-4 rounded-2xl bg-aqua px-6 py-3 font-black text-white" type="submit">Format JSON</button>
    </div>
    <div>
      <label class="font-bold">Formatted Output</label>
      <textarea readonly rows="18" class="mt-2 w-full rounded-3xl border-white/40 bg-white/85 p-5 font-mono text-sm shadow-glow backdrop-blur-xl dark:border-white/10 dark:bg-slate-950/70">{{ result }}</textarea>
    </div>
  </form>
</section>
{% endblock %}
